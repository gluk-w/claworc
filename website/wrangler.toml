# Cloudflare Workers configuration for the Claworc marketing site.
# Deploy with: cd website && npx wrangler deploy
#
# Coexists with:
#   - website/worker/wrangler.toml (claworc-providers, claworc.com/providers/*)
#   - Mintlify docs at claworc.com/docs
#
# Cloudflare matches more specific routes first, so claworc.com/providers/*
# continues to hit the providers Worker while everything else falls through
# to this Worker.

name = "claworc-site"
compatibility_date = "2026-01-31"

[site]
bucket = "./dist"

# Attach the production route. Comment out the [[routes]] block to deploy
# only to the claworc-site.<account>.workers.dev preview URL.
[[routes]]
pattern = "claworc.com/*"
zone_name = "claworc.com"
