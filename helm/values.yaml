replicaCount: 1

config:
  dataPath: /app/data
  k8sNamespace: claworc
  # rpid and rpOrigins must be set to your actual domain in production,
  # otherwise WebAuthn authentication will silently fail.
  # Example: rpid: example.com / rpOrigins: https://example.com
  rpid: localhost
  rpOrigins: http://localhost:8000

service:
  type: NodePort
  port: 8000
  nodePort: 30000

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  # NOTE: The PVC is created via helm.sh/hook: pre-install and is intentionally
  # excluded from Helm's normal resource tracking to preserve data across upgrades.
  # This means `helm uninstall` will NOT delete the PVC — you must remove it manually:
  #   kubectl delete pvc <release-name>-claworc-data -n <namespace>

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}

ingress:
  enabled: false
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

nodeSelector: {}

affinity: {}

tolerations: []
