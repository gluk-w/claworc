name: Website Worker

on:
  push:
    paths:
      - 'website/worker/**'
      - '.github/workflows/worker.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: make worker-test
